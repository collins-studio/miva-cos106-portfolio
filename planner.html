<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Planner - Student Portfolio</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/navigation.js" defer></script>
        <script src="js/planner.js" defer></script>
    </head>
    <body>
        <header>
            <nav>
                <button id="menu-btn" class="menu-btn">☰</button>
                <div id="nav-links" class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="projects.html">Projects</a>
                    <a href="planner.html" class="active">Planner</a>
                    <a href="contact.html">Contact</a>
                </div>
            </nav>
        </header>
        <main class="planner-page">
            <section>
                <h1>Academic Planner</h1>
            </section>

            <section>
                <form>
                    <fieldset>
                        <legend>Task Input</legend>
                        <label for="task">TODO List: </label>
                        <input type="text" id="task" name="task" placeholder="Enter a task...">
                        <div class="planner-buttons">
                            <button type="button" id="add-btn">Add task</button>
                            <button type="button" id="clear-btn">Clear task</button>
                        </div>
                    </fieldset>
                </form>
            </section>

            <section>
                <h2>Task List</h2>
                <ul id="task-list">
                    <!--JavaScript will add task here-->
                </ul>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Collins | COS 106 Lab Assessment</p>
        </footer>    
    </body>
</html>
