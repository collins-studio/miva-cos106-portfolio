<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact - Student Portfolio</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/navigation.js" defer></script>
        <script src="js/contact.js" defer></script>
    </head>
    <body>
        <header>
            <nav>
                <button id="menu-btn" class="menu-btn">☰</button>
                <div id="nav-links" class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="projects.html">Projects</a>
                    <a href="planner.html">Planner</a>
                    <a href="contact.html">Contact</a>
                </div>
            </nav>
        </header>
        <main>
            <section class="contact-section">
                <form id="contact-form" action="#">
                    <fieldset>
                        <legend>Contact Me</legend>
                        <label for="user-name">Name: </label>
                        <input type="text" id="user-name" name="user-name">
                        <small id="name-error" class="error-message"></small>
                
                        <label for="email">Email: </label>
                        <input type="email" id="email" name="email">
                        <small id="email-error" class="error-message"></small>

                        <label for="contact-number">Phone: </label>
                        <input type="tel" id="contact-number" name="phone">
                        <small id="phone-error" class="error-message"></small>
                    </fieldset>

                    <fieldset>
                        <legend>Message</legend>
                        <label for="message">Message: </label>
                        <textarea name="message" id="message" rows="4"></textarea>
                        <small id="message-error" class="error-message"></small>
                    </fieldset>
                    <p id="success-message" class="success-message"></p>
                    <button type="submit">Submit</button>
                </form>
            </section>            
        </main>
        <footer>
            <p>&copy; 2026 Collins | COS 106 Lab Assessment</p>
        </footer>
    </body>
</html>
